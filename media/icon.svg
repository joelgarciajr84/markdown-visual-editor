<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6D5BD0"/>
      <stop offset="1" stop-color="#9B5CF6"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1b1530" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- fundo arredondado -->
  <rect x="0" y="0" width="128" height="128" rx="28" fill="url(#bg)"/>

  <!-- "página" do documento -->
  <g filter="url(#soft)">
    <rect x="30" y="24" width="68" height="84" rx="9" fill="#ffffff"/>
  </g>

  <!-- linha de título (heading) em destaque -->
  <rect x="40" y="38" width="34" height="9" rx="4.5" fill="#7C5CF0"/>
  <!-- linhas de texto -->
  <rect x="40" y="56" width="48" height="6" rx="3" fill="#C9C7D6"/>
  <rect x="40" y="68" width="48" height="6" rx="3" fill="#C9C7D6"/>
  <rect x="40" y="80" width="32" height="6" rx="3" fill="#C9C7D6"/>

  <!-- marca "M" do markdown, sutil, no canto -->
  <text x="78" y="100" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#7C5CF0" text-anchor="middle">M</text>

  <!-- caret de edição visual -->
  <rect x="73" y="78" width="2.6" height="11" rx="1.3" fill="#7C5CF0"/>
</svg>
