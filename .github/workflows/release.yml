name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build + typecheck
        run: npm run package

      - name: Package VSIX
        run: npx vsce package --no-dependencies --out markdown-visual-editor.vsix

      - name: Publish to Visual Studio Marketplace
        run: npx vsce publish --no-dependencies --packagePath markdown-visual-editor.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      # Opcional: publica também no Open VSX (forks do VS Code).
      - name: Publish to Open VSX
        if: ${{ env.OVSX_PAT != '' }}
        run: npx ovsx publish markdown-visual-editor.vsix
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}

      - name: Attach VSIX to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: markdown-visual-editor.vsix
