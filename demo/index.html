<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Markdown WYSIWYG Editor — Demo</title>
  <style>
    /* VS Code Dark+ theme variables */
    :root {
      --vscode-foreground: #cccccc;
      --vscode-editor-background: #1e1e1e;
      --vscode-editor-foreground: #d4d4d4;
      --vscode-panel-border: rgba(128,128,128,0.35);
      --vscode-descriptionForeground: rgba(204,204,204,0.7);
      --vscode-textLink-foreground: #3794ff;
      --vscode-toolbar-hoverBackground: rgba(90,93,94,0.31);
      --vscode-inputOption-activeBackground: rgba(55,148,255,0.25);
      --vscode-textCodeBlock-background: rgba(10,10,10,0.4);
      --vscode-input-background: #3c3c3c;
      --vscode-input-border: rgba(255,255,255,0.12);
      --vscode-font-family: -apple-system, BlinkMacSystemFont, "Segoe WPC", "Segoe UI", system-ui, sans-serif;
      --vscode-editor-font-family: Consolas, "Courier New", monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #252526;
      font-family: var(--vscode-font-family);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Simulated VS Code window chrome */
    .vsc-titlebar {
      height: 35px;
      background: #3c3c3c;
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 8px;
      flex-shrink: 0;
      border-bottom: 1px solid rgba(0,0,0,0.3);
    }
    .vsc-titlebar-dots {
      display: flex;
      gap: 6px;
    }
    .vsc-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
    }
    .vsc-dot-red    { background: #ff5f57; }
    .vsc-dot-yellow { background: #ffbd2e; }
    .vsc-dot-green  { background: #28c840; }
    .vsc-title {
      font-size: 12px;
      color: rgba(255,255,255,0.6);
      margin-left: 8px;
    }

    /* Activity bar */
    .vsc-layout {
      display: flex;
      flex: 1;
      min-height: 0;
    }
    .vsc-activitybar {
      width: 48px;
      background: #333333;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 8px 0;
      gap: 4px;
      flex-shrink: 0;
    }
    .vsc-ab-icon {
      width: 34px; height: 34px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      cursor: pointer;
      color: rgba(255,255,255,0.5);
    }
    .vsc-ab-icon.active {
      color: #ffffff;
      border-left: 2px solid #ffffff;
    }

    /* Editor area */
    .vsc-editor-area {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      background: var(--vscode-editor-background);
    }

    /* Tab bar */
    .vsc-tabbar {
      height: 35px;
      background: #2d2d2d;
      display: flex;
      align-items: stretch;
      border-bottom: 1px solid rgba(0,0,0,0.3);
      flex-shrink: 0;
    }
    .vsc-tab {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 14px;
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      border-right: 1px solid rgba(0,0,0,0.3);
      cursor: pointer;
      white-space: nowrap;
    }
    .vsc-tab.active {
      color: #ffffff;
      background: var(--vscode-editor-background);
      border-top: 1px solid #007acc;
    }
    .vsc-tab-icon { font-size: 14px; }
    .vsc-tab-close {
      font-size: 14px;
      opacity: 0;
      width: 16px;
      text-align: center;
    }
    .vsc-tab:hover .vsc-tab-close { opacity: 0.7; }

    /* Editor title bar (above editor, below tabs) */
    .vsc-editor-title {
      height: 35px;
      background: #1e1e1e;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0 8px;
      gap: 4px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
    }
    .vsc-et-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 3px 8px;
      font-size: 12px;
      color: rgba(255,255,255,0.6);
      border-radius: 4px;
      cursor: pointer;
      border: none;
      background: transparent;
    }
    .vsc-et-btn:hover {
      background: rgba(255,255,255,0.1);
      color: #fff;
    }

    /* The actual editor webview */
    #editor-container {
      flex: 1;
      min-height: 0;
      overflow: hidden;
      position: relative;
    }

    /* Source code view (hidden by default) */
    #source-view {
      display: none;
      height: 100%;
      padding: 24px 32px;
      background: var(--vscode-editor-background);
      color: #d4d4d4;
      font-family: Consolas, "Courier New", monospace;
      font-size: 14px;
      line-height: 1.6;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }

    #root {
      height: 100%;
    }

    /* Status bar at bottom */
    .vsc-statusbar {
      height: 22px;
      background: #007acc;
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 16px;
      font-size: 12px;
      color: #fff;
      flex-shrink: 0;
    }
    .vsc-sb-item { opacity: 0.9; }
  </style>
  <link href="../dist/webview.css" rel="stylesheet" />
</head>
<body>

  <!-- VS Code Title Bar -->
  <div class="vsc-titlebar">
    <div class="vsc-titlebar-dots">
      <div class="vsc-dot vsc-dot-red"></div>
      <div class="vsc-dot vsc-dot-yellow"></div>
      <div class="vsc-dot vsc-dot-green"></div>
    </div>
    <span class="vsc-title">Visual Studio Code — README.md</span>
  </div>

  <div class="vsc-layout">
    <!-- Activity Bar -->
    <div class="vsc-activitybar">
      <div class="vsc-ab-icon active">📁</div>
      <div class="vsc-ab-icon">🔍</div>
      <div class="vsc-ab-icon">🌿</div>
      <div class="vsc-ab-icon">🧩</div>
    </div>

    <!-- Editor Area -->
    <div class="vsc-editor-area">
      <!-- Tabs -->
      <div class="vsc-tabbar">
        <div class="vsc-tab active">
          <span class="vsc-tab-icon">📝</span>
          README.md
          <span class="vsc-tab-close">×</span>
        </div>
      </div>

      <!-- Editor title / action buttons -->
      <div class="vsc-editor-title">
        <button class="vsc-et-btn" id="btn-toggle-source" onclick="toggleSource()">
          &lt;/&gt; Source
        </button>
        <button class="vsc-et-btn" onclick="toggleSource()">
          👁 Visual
        </button>
      </div>

      <!-- Editor container -->
      <div id="editor-container">
        <div id="root"></div>
        <div id="source-view"></div>
      </div>
    </div>
  </div>

  <!-- Status Bar -->
  <div class="vsc-statusbar">
    <span class="vsc-sb-item">main</span>
    <span class="vsc-sb-item">Markdown WYSIWYG Editor</span>
    <span class="vsc-sb-item" style="margin-left:auto">Ln 1, Col 1</span>
    <span class="vsc-sb-item">UTF-8</span>
    <span class="vsc-sb-item">Markdown</span>
  </div>

  <script>
    // ── VS Code API mock ────────────────────────────────────────────────────
    const INITIAL_MARKDOWN = `# Markdown WYSIWYG Editor

Write **Markdown** like a document, not like code.

## Features

- Rich-text editing with *live preview*
- Slash commands — type \`/\` to insert blocks
- One-click toggle between **Visual** and **Source** views
- Bidirectional sync: edits are saved as real \`.md\` files

## How it works

Open any \`.md\` file in VS Code — it loads in the visual editor automatically. Everything you type is saved as valid Markdown. Switch to source view and back without losing anything.

> **No lock-in.** Your files stay as plain \`.md\` files — the extension is purely a view layer.

\`\`\`bash
# Install from VS Code Marketplace
ext install JoelGarciaJr.markdown-visual-editor
\`\`\`
`;

    let vscodeReady = false;
    let sourceVisible = false;
    let currentMarkdown = INITIAL_MARKDOWN;

    function acquireVsCodeApi() {
      return {
        postMessage(message) {
          if (message.type === 'ready') {
            // Send initial content to the editor
            setTimeout(() => {
              window.dispatchEvent(new MessageEvent('message', {
                data: { type: 'init', text: INITIAL_MARKDOWN }
              }));
              vscodeReady = true;
            }, 100);
          } else if (message.type === 'edit') {
            currentMarkdown = message.text;
            document.getElementById('source-view').textContent = message.text;
          } else if (message.type === 'switchToSource') {
            toggleSource();
          }
        },
        getState() { return {}; },
        setState(state) {}
      };
    }

    function toggleSource() {
      sourceVisible = !sourceVisible;
      const root = document.getElementById('root');
      const src  = document.getElementById('source-view');
      const btn  = document.getElementById('btn-toggle-source');

      if (sourceVisible) {
        src.textContent = currentMarkdown;
        root.style.display = 'none';
        src.style.display = 'block';
        btn.textContent = '👁 Visual';
      } else {
        root.style.display = 'block';
        src.style.display = 'none';
        btn.innerHTML = '</> Source';
        // Re-sync editor with any external changes
        window.dispatchEvent(new MessageEvent('message', {
          data: { type: 'update', text: currentMarkdown }
        }));
      }
    }
  </script>

  <!-- Load the actual editor bundle -->
  <script src="../dist/webview.js"></script>
</body>
</html>
